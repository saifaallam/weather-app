<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weather app</title>
    <link rel="stylesheet" href="stylewp.css">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>
    <main class="main-container">

        
        <header class="city-input">
            <input type="text" class="search-input" placeholder="Search City">
            <button class="search-btn">
                <span class="material-symbols-outlined">search</span>
            </button>
        </header>

        <section class="weather-info" style="display: none">
            
            <div class="location-date-container">
                <div class="location">
                    <span class="material-symbols-outlined">location_on</span>
                    <h4 class="country-txt">Jakarta</h4>
                </div>
                <h5 class="current-date-txt regular-txt">Wed, 07 Aug</h5>
            </div>

            
            <div class="weather-summary-container">
                <img src="cloudy.png" alt="" class="weather-summary-img">
                <div class="weather-summary-info">
                    <h1 class="temp-txt">29 °C</h1>
                    <h3 class="condition-txt regular-txt">Clouds</h3>
                </div>
            </div>
        
            
            <div class="weather-conditions-container-wrapper">
                <div class="condition-item">
                    <span class="material-symbols-outlined">water_drop</span>
                    <div class="condition-info">
                        <h5 class="regular-txt">Humidity</h5>
                        <h5 class="humidity-value">55%</h5>
                    </div>
                </div>
                <div class="condition-item">
                    <span class="material-symbols-outlined">air</span>
                    <div class="condition-info">
                        <h5 class="regular-txt">Wind Speed</h5>
                        <h5 class="wind-value">2 M/s</h5>
                    </div>
                </div>
            </div>

            
            <div class="forecast-item-container">
                <div class="forecast-item">
                    <h5 class="forecast-item-date">05 Aug</h5>
                    <img src="storm.png"  class="forecast-item-img">
                    <h5 class="forecast -item-temp">29 °C</h5>
                </div>
                <div class="forecast-item">
                    <h5 class="forecast-item-date">05 Aug</h5>
                    <img src="storm.png"  class="forecast-item-img">
                    <h5 class="forecast -item-temp">29 °C</h5>
                </div>
               <div class="forecast-item">
                    <h5 class="forecast-item-date">05 Aug</h5>
                    <img src="storm.png"  class="forecast-item-img">
                    <h5 class="forecast -item-temp">29 °C</h5>
                </div>
                <div class="forecast-item">
                    <h5 class="forecast-item-date">05 Aug</h5>
                    <img src="storm.png"  class="forecast-item-img">
                    <h5 class="forecast-item-temp">29 °C</h5>
                </div>
            </div>
        </section>

         <section class="search-city section-message" ;">
            <img src="Generated Image August 28, 2025 - 11_13PM.jpeg">
            <div>
                <h1>Search City</h1>
                <h4 class="regular-txt">
                    Find out the weather conditions of the city
                </h4>
            </div>

        </section> 
        <section class="not-found section-message" style="display : none;">
            <img src="Generated Image August 28, 2025 - 11_36PM.jpeg">
            <div>
                <h1>Not found </h1>
                <h4 class="regular-txt">
                    Find out the weather conditions of the city
                </h4>
            </div>

        </section> 
    </main>
</body>
</html>
